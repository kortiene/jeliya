name: jeliya_app
description: >-
  Jeliya desktop — the native Flutter shell over the local jeliyad daemon.
  Spawns/adopts the sidecar per the Phase 0 supervision contract and renders
  the P2P rooms UI at parity with the reference web client (ui/).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Pinned by flutter_localizations; used directly for DateFormat/NumberFormat
  # under the separate FORMATTING locale (docs/i18n.md, decision 4).
  intl: any

  cupertino_icons: ^1.0.8

  # Native file picking (Composer / Files tab share flow).
  file_selector: ^1.0.3

  # External links: pipe previews, fetched-file copies, GitHub issue reports.
  url_launcher: ^6.3.0

  # OS share sheet for the invite ticket on phones (below the 900dp shell
  # breakpoint; desktop keeps copy-only). POLICY CHANGE (2026-07-10): the
  # plugin allowlist was deliberately file_selector + url_launcher only;
  # mobile release-readiness adds share_plus as the one sanctioned addition.
  # Provenance: publisher fluttercommunity.dev (NOT flutter.dev — the Flutter
  # team's own `share` plugin was discontinued in share_plus's favor; this is
  # the endorsed successor). New transitives at adoption (lockfile audit
  # 2026-07-10): share_plus_platform_interface, mime, file, uuid (→ fixnum),
  # win32 (→ ffi_leak_tracker) — everything else it needs (cross_file, ffi,
  # url_launcher_*, path_provider, web) was already resolved via
  # file_selector/url_launcher/path_provider.
  share_plus: ^13.2.1

  # Platform data dir (mobile has no ~/Library/Application Support); backs the
  # Android/iOS PrefsStore path and the FFI data dir.
  path_provider: ^2.1.4

  # dart:ffi helpers (Utf8) for the in-process libjeliya_ffi.so smoke — the
  # beachhead proving the native lib loads inside the Flutter process before
  # the full FfiClient transport lands.
  ffi: ^2.1.3

  # The transport-agnostic protocol client (WebSocket sidecar today, FFI later).
  jeliya_protocol:
    path: ../dart/jeliya_protocol

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
