    <path d="M16 13.5 V22" fill="none" stroke="#2fd6a4" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="9.5" cy="24.5" r="1.7" fill="#2fd6a4"/>
    <circle cx="16" cy="26.5" r="1.7" fill="#2fd6a4"/>
    <circle cx="22.5" cy="24.5" r="1.7" fill="#2fd6a4"/>
