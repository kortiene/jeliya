name: release

# Build and publish per-target `jeliyad` release binaries when a version tag
# (e.g. `v0.1.0`) is pushed.
#
# This workflow hardcodes no org or repo slug — it always builds the repo it
# runs in. Pushing a `v*` tag triggers it and attaches artifacts to the
# auto-created Release. See packaging/README.md for release follow-up.
#
# PHASE 2 (in progress): the per-target daemon archives from the `build`
# matrix are UNSIGNED until Phase 2 lands (issue #1). A *browser* download of
# an unsigned binary trips Gatekeeper (macOS) / SmartScreen (Windows). The
# curl|sh and Homebrew install paths in packaging/ do NOT set the quarantine
# bit, so they install cleanly. The `macos-app` DMG job below is the
# exception: it Developer-ID-signs and notarizes automatically when the six
# MACOS_*/NOTARY_* repo secrets exist, and falls back to ad-hoc signing
# otherwise. See docs/signing-notarization.md.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the Release and attach assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The same gates ci.yml runs on every push/PR. Both publish jobs `needs:`
  # this so a failed gate blocks the WHOLE release — no binary asset ever
  # publishes off a tree that fails verification.
  verify:
    name: verify
    uses: ./.github/workflows/ci.yml

  build:
    name: ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14 # Apple-silicon runner (native arm64)
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-14 # cross-targeted from the available Apple-silicon runner
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest # native x86_64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # `@stable` is always >= the repo MSRV (workspace rust-version = 1.80).
      # `targets` installs the cross target's std via rustup so cargo/zigbuild
      # can link against it.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # --- UI FIRST -----------------------------------------------------------
      # The `embed-ui` feature bakes ui/dist into the binary via rust-embed, so
      # ui/dist MUST exist before the cargo build. Built once per job.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build UI (produces ui/dist)
        working-directory: ui
        run: |
          npm ci
          npm run build

      # --- musl cross-compile via cargo-zigbuild ------------------------------
      # zig cc is the C linker; produces static musl binaries and dodges
      # glibc-version breakage (the approach the iroh project uses). The tree
      # has C deps (ring, libsqlite3-sys) + a QUIC/UDP stack (iroh), hence the
      # C toolchain requirement.
      - name: Setup Zig
        if: ${{ matrix.zigbuild }}
        shell: bash
        run: |
          set -eu
          zig_version="0.15.2"
          case "$(uname -m)" in
            x86_64) zig_arch="x86_64" ;;
            aarch64 | arm64) zig_arch="aarch64" ;;
            *) echo "unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          url="https://ziglang.org/download/${zig_version}/zig-${zig_arch}-linux-${zig_version}.tar.xz"
          curl -fsSL "$url" -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C /tmp
          zig_dir="/tmp/zig-${zig_arch}-linux-${zig_version}"
          "$zig_dir/zig" version
          echo "$zig_dir" >> "$GITHUB_PATH"

      - name: Install cargo-zigbuild
        if: ${{ matrix.zigbuild }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build jeliyad (zigbuild / musl)
        if: ${{ matrix.zigbuild }}
        run: cargo zigbuild --release -p jeliyad --features embed-ui --target ${{ matrix.target }}

      - name: Build jeliyad (native)
        if: ${{ !matrix.zigbuild }}
        run: cargo build --release -p jeliyad --features embed-ui --target ${{ matrix.target }}

      # --- package: tar.gz for unix, zip for windows --------------------------
      # Asset name: jeliyad-<tag>-<target>.<ext> (e.g.
      # jeliyad-v0.1.0-x86_64-apple-darwin.tar.gz). A .sha256 sidecar is
      # emitted alongside each archive to fill the Homebrew formula placeholders.
      - name: Package (tar.gz)
        if: ${{ matrix.archive == 'tar.gz' }}
        shell: bash
        run: |
          set -eu
          version="${GITHUB_REF_NAME}"
          asset="jeliyad-${version}-${{ matrix.target }}.tar.gz"
          stage="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/jeliyad" "$stage/"
          tar -czf "$asset" -C "$stage" jeliyad
          shasum -a 256 "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: ${{ matrix.archive == 'zip' }}
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $asset = "jeliyad-$version-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/jeliyad.exe" -DestinationPath $asset -Force
          ((Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower() + "  $asset") | Out-File -Encoding ascii "$asset.sha256"
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # The tag being built (github.ref) is the Release; created if absent.
          # The fixed body codifies the release voice (calm, truthful): what
          # this is, how to install, the unsigned-binary caveat, and how to
          # verify — generate_release_notes appends the changelog below it.
          generate_release_notes: true
          body: |
            `jeliyad` — the Jeliya peer-to-peer daemon. One binary: serves the app at `http://127.0.0.1:7420/`, holds your data locally, syncs rooms device-to-device.

            **Install**

            ```sh
            # macOS (Homebrew)
            brew install kortiene/jeliya/jeliya
            # macOS / Linux
            curl -fsSL https://raw.githubusercontent.com/kortiene/jeliya/main/packaging/install.sh | sh
            ```
            ```powershell
            # Windows
            irm https://raw.githubusercontent.com/kortiene/jeliya/main/packaging/install.ps1 | iex
            ```

            **These binaries are not yet signed.** A browser-downloaded archive will be blocked by macOS Gatekeeper / Windows SmartScreen. Homebrew and the install scripts install the same bytes without the quarantine bit — prefer them.

            Every archive has a `.sha256` sidecar — verify with `shasum -a 256 -c <asset>.sha256`.
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  # --- Jeliya.app (Flutter desktop, Phase 5) ----------------------------------
  # Universal (arm64 + x86_64) sandboxed bundle with the co-signed jeliyad
  # sidecar, packaged as a DMG by scripts/package-macos.mjs. Signing and
  # notarization activate automatically once the repo secrets exist
  # (MACOS_CERT_P12 / MACOS_CERT_PASSWORD / MACOS_SIGN_IDENTITY /
  # NOTARY_APPLE_ID / NOTARY_TEAM_ID / NOTARY_PASSWORD); without them the DMG
  # is ad-hoc signed and carries the same Gatekeeper caveat as the bare
  # binaries above.
  macos-app:
    name: macos-app (Jeliya.app DMG)
    needs: verify
    runs-on: macos-14
    env:
      HAS_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' && secrets.MACOS_SIGN_IDENTITY != '' }}
      HAS_NOTARY: ${{ secrets.NOTARY_APPLE_ID != '' && secrets.NOTARY_TEAM_ID != '' && secrets.NOTARY_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain (both mac targets for the universal sidecar)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-app

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Same pin as ci.yml: the DMG must ship the toolchain the verify
          # job gated on.
          flutter-version: 3.41.5
          cache: true

      - name: Import Developer ID certificate
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -eu
          keychain="$RUNNER_TEMP/signing.keychain-db"
          keychain_pass="$(uuidgen)"
          security create-keychain -p "$keychain_pass" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_pass" "$keychain"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$keychain" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$keychain_pass" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Store notarization credentials
        if: ${{ env.HAS_SIGNING == 'true' && env.HAS_NOTARY == 'true' }}
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials jeliya-notary \
            --apple-id "$NOTARY_APPLE_ID" --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD"

      # The runtime gate is skipped on CI: it launches the sandboxed GUI app
      # and SIGTERMs it, which is validated locally per release; runner window
      # servers make it flaky. Everything static (signatures, entitlements,
      # universal archs) still gates the build.
      - name: Package Jeliya.app + DMG
        env:
          JELIYA_SIGN_IDENTITY: ${{ env.HAS_SIGNING == 'true' && secrets.MACOS_SIGN_IDENTITY || '-' }}
          JELIYA_NOTARY_PROFILE: ${{ env.HAS_SIGNING == 'true' && env.HAS_NOTARY == 'true' && 'jeliya-notary' || '' }}
        run: node scripts/package-macos.mjs --skip-gate

      - name: Checksum
        run: |
          set -eu
          dmg="$(ls dist/Jeliya-v*-macos.dmg)"
          shasum -a 256 "$dmg" > "$dmg.sha256"
          echo "DMG=$dmg" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: false
          files: |
            ${{ env.DMG }}
            ${{ env.DMG }}.sha256
