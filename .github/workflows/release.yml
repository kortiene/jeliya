name: release

# Build and publish per-target `jeliyad` release binaries when a version tag
# (e.g. `v0.1.0`) is pushed.
#
# This workflow hardcodes no org or repo slug — it always builds the repo it
# runs in. Pushing a `v*` tag triggers it and attaches artifacts to the
# auto-created Release. See packaging/README.md for release follow-up.
#
# PHASE 2 (deferred): macOS notarization + Windows Authenticode signing. The
# artifacts produced here are UNSIGNED. A *browser* download of an unsigned
# binary trips Gatekeeper (macOS) / SmartScreen (Windows). The curl|sh and
# Homebrew install paths in packaging/ do NOT set the quarantine bit, so they
# install cleanly. Signing/notarization is tracked for Phase 2 and is
# intentionally out of scope here.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the Release and attach assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14 # Apple-silicon runner (native arm64)
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-14 # cross-targeted from the available Apple-silicon runner
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest # native x86_64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # `@stable` is always >= the repo MSRV (workspace rust-version = 1.80).
      # `targets` installs the cross target's std via rustup so cargo/zigbuild
      # can link against it.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # --- UI FIRST -----------------------------------------------------------
      # The `embed-ui` feature bakes ui/dist into the binary via rust-embed, so
      # ui/dist MUST exist before the cargo build. Built once per job.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build UI (produces ui/dist)
        working-directory: ui
        run: |
          npm ci
          npm run build

      # --- musl cross-compile via cargo-zigbuild ------------------------------
      # zig cc is the C linker; produces static musl binaries and dodges
      # glibc-version breakage (the approach the iroh project uses). The tree
      # has C deps (ring, libsqlite3-sys) + a QUIC/UDP stack (iroh), hence the
      # C toolchain requirement.
      - name: Setup Zig
        if: ${{ matrix.zigbuild }}
        shell: bash
        run: |
          set -eu
          zig_version="0.15.2"
          case "$(uname -m)" in
            x86_64) zig_arch="x86_64" ;;
            aarch64 | arm64) zig_arch="aarch64" ;;
            *) echo "unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          url="https://ziglang.org/download/${zig_version}/zig-${zig_arch}-linux-${zig_version}.tar.xz"
          curl -fsSL "$url" -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C /tmp
          zig_dir="/tmp/zig-${zig_arch}-linux-${zig_version}"
          "$zig_dir/zig" version
          echo "$zig_dir" >> "$GITHUB_PATH"

      - name: Install cargo-zigbuild
        if: ${{ matrix.zigbuild }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build jeliyad (zigbuild / musl)
        if: ${{ matrix.zigbuild }}
        run: cargo zigbuild --release -p jeliyad --features embed-ui --target ${{ matrix.target }}

      - name: Build jeliyad (native)
        if: ${{ !matrix.zigbuild }}
        run: cargo build --release -p jeliyad --features embed-ui --target ${{ matrix.target }}

      # --- package: tar.gz for unix, zip for windows --------------------------
      # Asset name: jeliyad-<tag>-<target>.<ext> (e.g.
      # jeliyad-v0.1.0-x86_64-apple-darwin.tar.gz). A .sha256 sidecar is
      # emitted alongside each archive to fill the Homebrew formula placeholders.
      - name: Package (tar.gz)
        if: ${{ matrix.archive == 'tar.gz' }}
        shell: bash
        run: |
          set -eu
          version="${GITHUB_REF_NAME}"
          asset="jeliyad-${version}-${{ matrix.target }}.tar.gz"
          stage="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/jeliyad" "$stage/"
          tar -czf "$asset" -C "$stage" jeliyad
          shasum -a 256 "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: ${{ matrix.archive == 'zip' }}
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $asset = "jeliyad-$version-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/jeliyad.exe" -DestinationPath $asset -Force
          ((Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower() + "  $asset") | Out-File -Encoding ascii "$asset.sha256"
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # The tag being built (github.ref) is the Release; created if absent.
          # The fixed body codifies the release voice (calm, truthful): what
          # this is, how to install, the unsigned-binary caveat, and how to
          # verify — generate_release_notes appends the changelog below it.
          generate_release_notes: true
          body: |
            `jeliyad` — the Jeliya peer-to-peer daemon. One binary: serves the app at `http://127.0.0.1:7420/`, holds your data locally, syncs rooms device-to-device.

            **Install**

            ```sh
            # macOS (Homebrew)
            brew install kortiene/jeliya/jeliya
            # macOS / Linux
            curl -fsSL https://raw.githubusercontent.com/kortiene/jeliya/main/packaging/install.sh | sh
            ```
            ```powershell
            # Windows
            irm https://raw.githubusercontent.com/kortiene/jeliya/main/packaging/install.ps1 | iex
            ```

            **These binaries are not yet signed.** A browser-downloaded archive will be blocked by macOS Gatekeeper / Windows SmartScreen. Homebrew and the install scripts install the same bytes without the quarantine bit — prefer them.

            Every archive has a `.sha256` sidecar — verify with `shasum -a 256 -c <asset>.sha256`.
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
