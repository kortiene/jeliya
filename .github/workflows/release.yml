name: release

# v0.5.x publishes only the daemon with its embedded web UI. All binaries and
# checksum sidecars are built as private workflow artifacts first. A read-only
# job validates and seals the complete set. The sole write-capable job verifies
# that receipt without executing candidate bytes, uploads a private draft,
# verifies the remote assets, and only then makes the release visible.

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact release tag to promote (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify-first:
    name: Required CI gates (clean run 1 of 2)
    uses: ./.github/workflows/ci.yml

  verify-second:
    name: Required CI gates (clean run 2 of 2)
    uses: ./.github/workflows/ci.yml

  embedded-ui:
    name: Build the embedded web UI once
    needs:
      - verify-first
      - verify-second
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ inputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.22.3'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Validate tag, source versions, lockfiles, and changelog
        run: |
          set -euo pipefail
          remote_tip="$(git ls-remote --exit-code --heads origin "refs/heads/$DEFAULT_BRANCH" | awk 'NF == 2 { print $1 }')"
          printf '%s' "$remote_tip" | grep -Eq '^[0-9a-f]{40}$' || {
            echo "could not resolve exactly one immutable tip for $DEFAULT_BRANCH" >&2
            exit 1
          }
          test "$GITHUB_SHA" = "$remote_tip" || {
            echo "release must promote the current tip of $DEFAULT_BRANCH" >&2
            exit 1
          }
          node scripts/check-release.mjs --source --publish --tag "$RELEASE_TAG"

      - name: Build UI
        working-directory: ui
        run: |
          set -euo pipefail
          npm ci
          npm run build
          test -s dist/index.html

      - name: Upload immutable UI input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: embedded-ui
          path: ui/dist/
          if-no-files-found: error
          retention-days: 3

  build:
    name: Build ${{ matrix.target }}
    needs:
      - verify-first
      - verify-second
      - embedded-ui
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ inputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain and target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.91.0
          targets: ${{ matrix.target }}

      - name: Record and verify the pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustc --version | grep '^rustc 1\.91\.0 '
          rustc -Vv
          cargo -V

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.2
        with:
          key: release-${{ matrix.target }}

      - name: Download the verified UI build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: embedded-ui
          path: ui/dist

      - name: Assert embedded UI input
        shell: bash
        run: |
          set -euo pipefail
          test -s ui/dist/index.html
          test "$(find ui/dist -type f | wc -l | tr -d ' ')" -gt 1

      # Zig is downloaded only on Linux cross-builds. Its published archive is
      # authenticated against a hard-coded SHA-256 before extraction/execution.
      - name: Download and verify Zig 0.15.2
        if: ${{ matrix.zigbuild == true }}
        shell: bash
        run: |
          set -euo pipefail
          zig_version="0.15.2"
          case "$(uname -m)" in
            x86_64)
              zig_arch="x86_64"
              zig_sha256="02aa270f183da276e5b5920b1dac44a63f1a49e55050ebde3aecc9eb82f93239"
              ;;
            aarch64 | arm64)
              zig_arch="aarch64"
              zig_sha256="958ed7d1e00d0ea76590d27666efbf7a932281b3d7ba0c6b01b0ff26498f667f"
              ;;
            *)
              echo "unsupported runner architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          archive="zig-${zig_arch}-linux-${zig_version}.tar.xz"
          url="https://ziglang.org/download/${zig_version}/${archive}"
          curl --proto '=https' --tlsv1.2 --retry 5 --retry-all-errors -fsSL \
            "$url" -o "$RUNNER_TEMP/$archive"
          printf '%s  %s\n' "$zig_sha256" "$RUNNER_TEMP/$archive" | sha256sum -c -
          tar -xJf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP"
          zig_dir="$RUNNER_TEMP/zig-${zig_arch}-linux-${zig_version}"
          test "$("$zig_dir/zig" version)" = "$zig_version"
          echo "$zig_dir" >> "$GITHUB_PATH"

      - name: Install pinned cargo-zigbuild
        if: ${{ matrix.zigbuild == true }}
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-zigbuild@0.23.0

      - name: Build jeliyad (static musl)
        if: ${{ matrix.zigbuild == true }}
        run: cargo zigbuild --locked --release -p jeliyad --features embed-ui --target ${{ matrix.target }}

      - name: Build jeliyad (native)
        if: ${{ matrix.zigbuild != true }}
        run: cargo build --locked --release -p jeliyad --features embed-ui --target ${{ matrix.target }}

      - name: Verify the native Windows daemon starts and reports the release version
        if: ${{ matrix.target == 'x86_64-pc-windows-msvc' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $actual = & "target/${{ matrix.target }}/release/jeliyad.exe" --version
          $expected = "jeliyad $($env:RELEASE_TAG.TrimStart('v'))"
          if ($actual -cne $expected) {
            throw "Windows daemon version mismatch: got '$actual', expected '$expected'"
          }

      - name: Package and verify tar.gz
        if: ${{ matrix.archive == 'tar.gz' }}
        shell: bash
        run: |
          set -euo pipefail
          asset="jeliyad-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          stage="$RUNNER_TEMP/jeliya-package-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/jeliyad" "$stage/jeliyad"
          tar -czf "$asset" -C "$stage" jeliyad
          test "$(tar -tzf "$asset")" = "jeliyad"
          shasum -a 256 "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Package and verify zip
        if: ${{ matrix.archive == 'zip' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $asset = "jeliyad-$env:RELEASE_TAG-${{ matrix.target }}.zip"
          Compress-Archive -LiteralPath "target/${{ matrix.target }}/release/jeliyad.exe" -DestinationPath $asset -Force
          $stage = Join-Path $env:RUNNER_TEMP 'jeliya-zip-check'
          Expand-Archive -LiteralPath $asset -DestinationPath $stage -Force
          $members = @(Get-ChildItem -LiteralPath $stage -Recurse -File)
          if ($members.Count -ne 1 -or $members[0].Name -cne 'jeliyad.exe') {
            throw 'release zip must contain exactly jeliyad.exe'
          }
          ((Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash.ToLowerInvariant() + "  $asset") |
            Out-File -Encoding ascii "$asset.sha256"
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload private build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          if-no-files-found: error
          retention-days: 3

  validate-release:
    name: Validate and seal the complete release set
    needs:
      - verify-first
      - verify-second
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ inputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.22.3'

      - name: Download all daemon artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Validate source, names, archive members, and checksums
        run: |
          set -euo pipefail
          remote_tip="$(git ls-remote --exit-code --heads origin "refs/heads/$DEFAULT_BRANCH" | awk 'NF == 2 { print $1 }')"
          printf '%s' "$remote_tip" | grep -Eq '^[0-9a-f]{40}$' || {
            echo "could not resolve exactly one immutable tip for $DEFAULT_BRANCH" >&2
            exit 1
          }
          test "$GITHUB_SHA" = "$remote_tip" || {
            echo "default branch moved after build; rerun release from its new tip" >&2
            exit 1
          }
          node scripts/check-release.mjs --source --publish --tag "$RELEASE_TAG"
          node scripts/check-release.mjs --artifacts dist --tag "$RELEASE_TAG"

      - name: Seal the validated artifact receipt
        run: |
          set -euo pipefail
          receipt_dir="$RUNNER_TEMP/validated-set"
          remote_tip="$(git ls-remote --exit-code --heads origin "refs/heads/$DEFAULT_BRANCH" | awk 'NF == 2 { print $1 }')"
          test "$remote_tip" = "$GITHUB_SHA"
          node scripts/release-receipt.mjs create \
            --artifacts dist \
            --receipt "$receipt_dir" \
            --tag "$RELEASE_TAG" \
            --commit "$GITHUB_SHA" \
            --default-tip "$remote_tip"

      - name: Upload the sealed validation receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validated-set
          path: ${{ runner.temp }}/validated-set/
          if-no-files-found: error
          retention-days: 3

  smoke-release:
    name: Smoke the immutable release binary without write authority
    needs:
      - validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ inputs.version }}
    steps:
      - name: Download the immutable Linux release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-x86_64-unknown-linux-musl
          path: dist

      - name: Verify the built daemon reports the tag version
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/jeliya-version-check"
          mkdir -p "$stage"
          archive="dist/jeliyad-${RELEASE_TAG}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf "$archive" -C "$stage"
          actual="$("$stage/jeliyad" --version)"
          expected="jeliyad ${RELEASE_TAG#v}"
          test "$actual" = "$expected" || {
            echo "daemon version mismatch: got '$actual', expected '$expected'" >&2
            exit 1
          }

  publish:
    name: Publish the sealed asset set at one visibility boundary
    needs:
      - validate-release
      - smoke-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      RELEASE_BODY: |
        `jeliyad` is the Jeliya peer-to-peer daemon with the verified web UI embedded.

        This technical preview intentionally publishes the daemon archives only. Native mobile and desktop packages remain unpublished until their platform gates are fully satisfied.

        Each archive has a `.sha256` sidecar. The official Unix and Windows installers download and verify that checksum before extracting anything.

        This release is intentionally marked as a prerelease, so the installers' unpinned `latest` path continues to select the latest stable release. Install this preview explicitly:

        ```sh
        curl -fsSL https://raw.githubusercontent.com/kortiene/jeliya/${{ inputs.version }}/packaging/install.sh | JELIYA_VERSION=${{ inputs.version }} sh
        ```

        ```powershell
        $env:JELIYA_VERSION = '${{ inputs.version }}'
        irm https://raw.githubusercontent.com/kortiene/jeliya/${{ inputs.version }}/packaging/install.ps1 | iex
        ```
    steps:
      - name: Fetch trusted release verification code without credentials
        run: |
          set -euo pipefail
          source_dir="$RUNNER_TEMP/release-source"
          git init --quiet "$source_dir"
          git -C "$source_dir" remote add origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c credential.helper= -C "$source_dir" fetch --quiet --depth=1 origin \
            "refs/heads/$DEFAULT_BRANCH"
          fetched="$(git -C "$source_dir" rev-parse FETCH_HEAD)"
          test "$fetched" = "$GITHUB_SHA" || {
            echo "public verification source does not match workflow commit" >&2
            exit 1
          }
          git -C "$source_dir" checkout --quiet --detach FETCH_HEAD
          echo "RELEASE_SOURCE=$source_dir" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.22.3'

      - name: Download all daemon artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download the sealed validation receipt
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-set
          path: validation

      - name: Verify the sealed inputs without executing them
        run: |
          set -euo pipefail
          node "$RELEASE_SOURCE/scripts/release-receipt.mjs" verify \
            --artifacts dist \
            --receipt validation \
            --tag "$RELEASE_TAG" \
            --expected-commit "$GITHUB_SHA" \
            --expected-default-tip "$GITHUB_SHA"
          remote_tip="$(git ls-remote --exit-code --heads \
            "https://github.com/${GITHUB_REPOSITORY}.git" \
            "refs/heads/$DEFAULT_BRANCH" | awk 'NF == 2 { print $1 }')"
          test "$remote_tip" = "$GITHUB_SHA" || {
            echo "default branch moved after validation; rerun release" >&2
            exit 1
          }

      # GitHub has no transaction spanning a Git tag and all release assets.
      # The guarantee below is therefore complete asset-set visibility, not
      # transactional tag-plus-release atomicity.
      # The complete artifact set is therefore built and verified privately
      # first. This final job creates the tag plus a private draft, verifies the
      # uploaded bytes, and exposes the release only with the final PATCH. Its
      # EXIT trap removes only the draft/tag this run created on failure.
      - name: Create, verify, and publish the complete release
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash "$RELEASE_SOURCE/scripts/finalize-release.sh" dist
