name: ci

# The i18n / app / package / Rust verification, on every PR and every push to
# main — a literal leak, generated-code drift, or Rust regression must fail
# here, not lie in wait on main until a release tag is cut. release.yml calls
# this same workflow (workflow_call) so a release runs the identical gates and
# its publish jobs can `needs:` it.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: verify (i18n + app + package gates)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned: the gen-drift gate below is byte-exact, so the generator
          # version must match the one that produced the committed gen/ files.
          # Bump the pin and regenerate/commit together.
          flutter-version: 3.41.5
          cache: true

      - name: Verify i18n + app gates (gen drift, analyze, tests, gate)
        working-directory: app
        run: |
          set -eu
          flutter pub get
          # Committed generated l10n must match the ARB catalog exactly.
          # `git status --porcelain` (not `git diff`) so newly created or
          # deleted generated files count as drift too — an ARB for a new
          # locale whose gen/ output was never committed must fail here.
          flutter gen-l10n
          test -z "$(git status --porcelain -- lib/src/l10n/gen)"
          # The generated parity test must match the ARB too.
          node ../scripts/gen-l10n-parity.mjs
          test -z "$(git status --porcelain -- test/l10n_parity_test.dart)"
          flutter analyze
          flutter test
          node ../scripts/i18n-gate.mjs

      - name: Verify jeliya_protocol
        working-directory: dart/jeliya_protocol
        run: |
          set -eu
          dart pub get
          dart analyze
          dart test

  rust:
    name: rust (fmt + clippy + tests + daemon conformance)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      # The daemon-bound jeliya_protocol suites (conformance, daemon HTTP,
      # supervisor) skip themselves when target/debug/jeliyad is missing —
      # which is every run of the verify job above. Build the daemon here so
      # the golden corpus actually replays against it on every PR.
      - name: Build jeliyad for daemon-bound suites
        run: cargo build -p jeliyad

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Daemon conformance (jeliya_protocol against the built daemon)
        working-directory: dart/jeliya_protocol
        run: |
          set -eu
          dart pub get
          dart test
